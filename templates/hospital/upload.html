<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital | Upload Medical Record</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f8f8f8;
      color: #111;
    }

    .topbar {
      background: #ffffff;
      padding: 18px 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    .brand {
      font-weight: 600;
      font-size: 18px;
    }

    .nav {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid #ddd;
      background: #fff;
      color: #111;
      cursor: pointer;
    }

    .btn.primary {
      background: #000;
      color: #ffb703;
      border-color: #000;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 70px 60px;
    }

    .header {
      margin-bottom: 22px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .header p {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }

    .card {
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.08);
      padding: 28px;
    }

    .badge {
      display: inline-block;
      background: #000;
      color: #ffb703;
      padding: 6px 14px;
      border-radius: 18px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    input[readonly] {
      background: #f3f3f3;
      cursor: not-allowed;
    }

    input:focus,
    select:focus {
      border-color: #ffb703;
      outline: none;
    }

    .submit-btn {
      margin-top: 20px;
      background: #000;
      color: #ffb703;
      border: none;
      padding: 14px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      cursor: pointer;
    }

    .flash {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 13px;
      background: #fff3cd;
      border: 1px solid #ffe69c;
      color: #664d03;
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 18px;
      }
      .container {
        padding: 24px 18px 50px;
      }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">Hospital Panel</div>
  <div class="nav">
    <a class="btn primary" href="/hospital/dashboard">Dashboard</a>
    <a class="btn" href="/logout">Logout</a>
  </div>
</div>

<div class="container">
  <div class="header">
    <h1>Upload Medical Record</h1>
    <p>Select a patient and upload an encrypted medical record.</p>
  </div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="card">
    <div class="badge">Encrypted Upload</div>

    <form method="POST" action="/hospital/upload" enctype="multipart/form-data">

      <!-- Patient Email Dropdown -->
      <div class="form-group">
        <label>Patient Email</label>
        <select id="patientEmail" required>
          <option value="">Select Patient Email</option>
          {% for p in patients %}
            <option value="{{ p.id }}"
                    data-name="{{ p.name }}"
                    data-email="{{ p.email }}">
              {{ p.email }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Auto-filled Patient Name -->
      <div class="form-group">
        <label>Patient Name</label>
        <input type="text" id="patientName" readonly placeholder="Auto-filled">
      </div>

      <!-- Hidden Patient ID -->
      <input type="hidden" name="patient_id" id="patientId">

      <!-- Record Title -->
      <div class="form-group">
        <label>Record Title</label>
        <input type="text" name="title" required placeholder="e.g. Blood Test Report">
      </div>

      <!-- File Upload -->
      <div class="form-group">
        <label>Select Medical File (PDF / Image)</label>
        <input type="file" name="file" required>
      </div>

      <button type="submit" class="submit-btn">
        Upload & Encrypt Record
      </button>

    </form>
  </div>
</div>

<!-- ================= AUTO-FILL SCRIPT ================= -->
<script>
  const emailSelect = document.getElementById("patientEmail");
  const nameInput = document.getElementById("patientName");
  const idInput = document.getElementById("patientId");

  emailSelect.addEventListener("change", function () {
    const selected = this.options[this.selectedIndex];

    if (!selected.value) {
      nameInput.value = "";
      idInput.value = "";
      return;
    }

    nameInput.value = selected.getAttribute("data-name");
    idInput.value = selected.value;
  });
</script>

</body>
</html>
